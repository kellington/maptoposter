name: PR Script Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.py"
      - "**/*.sh"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/pr-checks.yml"

jobs:
  scripts-check:
    name: Validate Python and Bash scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install Python dependencies and ruff
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint Python scripts
        run: ruff check create_map_poster.py font_management.py

      - name: Validate Python syntax
        run: python -m py_compile create_map_poster.py font_management.py

      - name: Lint Bash scripts
        run: shellcheck test/all_variations.sh

      - name: Validate Bash syntax
        run: bash -n test/all_variations.sh

      - name: Smoke test poster CLI
        env:
          MPLCONFIGDIR: ${{ runner.temp }}/mplconfig
          XDG_CACHE_HOME: ${{ runner.temp }}/xdg-cache
        run: |
          python create_map_poster.py --help
          python create_map_poster.py --list-themes
